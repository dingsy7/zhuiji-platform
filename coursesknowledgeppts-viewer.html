<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>临床问题串联精品小讲课 - 筑基云平台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: #f5f7fa; }
body { padding-top: 42px; }

.topbar {
  position: fixed; top: 0; left: 0; right: 0;
  background: #003B7E; color: #fff; padding: 10px 24px;
  display: flex; align-items: center; gap: 16px; z-index: 100;
}
.topbar a { color: #fff; text-decoration: none; font-size: 13px; opacity: 0.85; }
.topbar a:hover { opacity: 1; }
.topbar h1 { font-size: 18px; font-weight: 500; }
.topbar .meta { margin-left: auto; font-size: 13px; opacity: 0.7; }

.main { display: flex; height: calc(100vh - 42px); min-height: 0; }

/* Sidebar */
.sidebar {
  width: 260px; background: #fff; border-right: 1px solid #e0e0e0;
  overflow-y: auto; flex-shrink: 0;
  display: flex; flex-direction: column;
}
.sidebar-header {
  padding: 14px 18px 10px; font-size: 12px; color: #999;
  text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #f0f0f0;
}
.pdf-item {
  padding: 10px 18px; cursor: pointer; font-size: 13px; color: #333;
  border-left: 3px solid transparent; transition: all 0.15s;
  line-height: 1.4; flex-shrink: 0;
}
.pdf-item:hover { background: #f0f4ff; color: #003B7E; }
.pdf-item.active {
  background: #e8f0fe; color: #003B7E;
  border-left-color: #003B7E; font-weight: 600;
}

/* Viewer */
.viewer {
  flex: 1; display: flex; flex-direction: column; background: #525659; min-width: 0;
}
.viewer-header {
  display: flex; align-items: center; padding: 6px 16px;
  background: #323639; flex-shrink: 0; color: #eee; font-size: 13px;
}
.viewer-header .pdf-name { flex: 1; font-weight: 500; }

/*
  Chrome's built-in PDF viewer has a ~45px toolbar at top.
  We push the iframe up by 45px so the toolbar is clipped out of view.
  The user sees only the PDF content filling the full area.
*/
.pdf-wrapper {
  flex: 1; position: relative; overflow: hidden; min-height: 0;
}
.pdf-iframe {
  position: absolute;
  top: -45px;
  left: 0;
  width: 100%;
  height: calc(100% + 45px);
  border: none;
}

/* Placeholder */
.placeholder {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: #bbb;
  position: absolute; top: 0; left: 0; width: 100%;
}
.placeholder .icon { font-size: 64px; margin-bottom: 12px; opacity: 0.5; }
.placeholder .title { font-size: 18px; margin-bottom: 6px; }
.placeholder .hint { font-size: 13px; color: #999; }
</style>
</head>
<body>
<div class="topbar">
  <a href="../../index.html">&#8592; 返回首页</a>
  <h1>临床问题串联精品小讲课</h1>
  <span class="meta">共 11 个课件</span>
</div>
<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">课件列表</div>
  </div>
  <div class="viewer" id="viewer">
    <div class="viewer-header" id="viewerHeader" style="display:none">
      <span class="pdf-name" id="pdfName"></span>
    </div>
    <div class="pdf-wrapper" id="pdfWrapper" oncontextmenu="return false;">
      <div class="placeholder" id="placeholder">
        <div class="icon">&#128196;</div>
        <div class="title">请从左侧选择一个课件</div>
        <div class="hint">点击课件名称即可在线预览</div>
      </div>
    </div>
  </div>
</div>

<script>
var PDFS = [
  "内分泌科常见检查的临床意义",
  "出血性疾病",
  "呼吸衰竭及血气分析",
  "常用抗菌药物及其临床应用",
  "心律失常的药物治疗",
  "消化性溃疡的药物治疗",
  "白血病",
  "肝功能异常解读",
  "肾病综合征",
  "血尿和蛋白尿检查的临床意义",
  "高血压治疗"
];

var sidebar = document.getElementById('sidebar');
var pdfWrapper = document.getElementById('pdfWrapper');
var viewerHeader = document.getElementById('viewerHeader');
var elPdfName = document.getElementById('pdfName');
var placeholder = document.getElementById('placeholder');

PDFS.forEach(function(name) {
  var item = document.createElement('div');
  item.className = 'pdf-item';
  item.textContent = name;
  item.onclick = function() { loadPDF(name, item); };
  sidebar.appendChild(item);
});

function loadPDF(name, itemEl) {
  document.querySelectorAll('.pdf-item').forEach(function(el) { el.classList.remove('active'); });
  itemEl.classList.add('active');
  elPdfName.textContent = name;
  viewerHeader.style.display = 'flex';

  // Remove old iframe
  var oldIframe = pdfWrapper.querySelector('iframe');
  if (oldIframe) oldIframe.remove();

  // Hide placeholder
  placeholder.style.display = 'none';

  // Direct file path — Chrome handles Chinese in file:// paths natively
  // No sandbox attribute: Chrome blocks sandboxed iframes from loading file:// URLs
  var pdfPath = 'pdfs/' + name + '.pdf';

  var iframe = document.createElement('iframe');
  iframe.className = 'pdf-iframe';
  iframe.src = pdfPath;
  pdfWrapper.appendChild(iframe);
}

// Block keyboard shortcuts for saving
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) {
    e.preventDefault();
    return false;
  }
});

// Disable right-click on the whole page
document.addEventListener('contextmenu', function(e) {
  e.preventDefault();
  return false;
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>关爱心理与情绪健康 - 筑基云平台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
body { padding-top: 48px; background: #f5f7fa; }
.topbar {
  position: fixed; top: 0; left: 0; right: 0;
  background: #003B7E; color: #fff; padding: 12px 24px;
  display: flex; align-items: center; gap: 16px; z-index: 100;
}
.topbar a { color: #fff; text-decoration: none; font-size: 14px; opacity: 0.85; }
.topbar a:hover { opacity: 1; }
.topbar h1 { font-size: 20px; font-weight: 500; }
.main { display: flex; height: calc(100vh - 48px); min-height: 0; }
.sidebar {
  width: 280px; background: #fff; border-right: 1px solid #e0e0e0;
  overflow-y: auto; flex-shrink: 0;
}
.sidebar h2 { font-size: 14px; padding: 16px 20px 8px; color: #888; letter-spacing: 1px; }
.sidebar hr { border: none; border-top: 1px solid #e0e0e0; margin: 4px 0; }
.item {
  padding: 12px 20px; cursor: pointer; font-size: 14px; color: #333;
  border-left: 3px solid transparent; transition: all 0.15s;
  display: flex; align-items: center; gap: 8px;
}
.item:hover { background: #f0f4ff; color: #003B7E; }
.item.active { background: #e8f0fe; color: #003B7E; border-left-color: #003B7E; font-weight: 600; }
.item-badge { font-size: 11px; padding: 1px 6px; border-radius: 3px; color: #fff; }
.badge-pdf { background: #d35400; }
.badge-video { background: #27ae60; }
.viewer { flex: 1; display: flex; flex-direction: column; background: #525659; }
.info-bar {
  background: #fff; padding: 10px 20px; font-size: 15px; font-weight: 600;
  color: #003B7E; border-bottom: 1px solid #e0e0e0; flex-shrink: 0;
  display: flex; align-items: center; gap: 10px;
}
.type-tag { font-size: 11px; padding: 2px 8px; border-radius: 3px; color: #fff; font-weight: 400; }
.tag-pdf { background: #d35400; }
.tag-video { background: #27ae60; }
.content-wrapper {
  flex: 1; position: relative; overflow: hidden; min-height: 0;
}
.pdf-iframe {
  position: absolute; top: -45px; left: 0;
  width: 100%; height: calc(100% + 45px); border: none;
}
.video-embed {
  width: 100%; height: 100%; border: none; background: #000;
}
.placeholder {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: #ccc; font-size: 18px; background: #525659;
}
</style>
</head>
<body>
<div class="topbar">
  <a href="../../index.html">← 返回首页</a>
  <h1>关爱心理与情绪健康</h1>
  <span style="margin-left:auto;font-size:13px;opacity:0.7">1 课件 + 1 视频</span>
</div>
<div class="main">
  <div class="sidebar" id="sidebar">
    <h2>课件</h2>
    <div class="item" data-type="pdf" data-src="psychology/从心理学中学习情绪管理.pdf">📄 从心理学中学习情绪管理<span class="item-badge badge-pdf">PDF</span></div>
    <hr>
    <h2>视频</h2>
    <div class="item" data-type="video" data-src="psychology/如何自我识别心理问题.mp4">🎬 如何自我识别心理问题<span class="item-badge badge-video">视频</span></div>
  </div>
  <div class="viewer">
    <div class="info-bar" id="infoBar">请选择课件或视频</div>
    <div class="content-wrapper" id="contentWrapper">
      <div class="placeholder">← 请从左侧选择学习内容</div>
    </div>
  </div>
</div>
<script>
var infoBar = document.getElementById('infoBar');
var contentWrapper = document.getElementById('contentWrapper');

document.querySelectorAll('.item').forEach(function(item) {
  item.onclick = function() {
    document.querySelectorAll('.item').forEach(function(el) { el.classList.remove('active'); });
    item.classList.add('active');

    var type = item.getAttribute('data-type');
    var src = item.getAttribute('data-src');
    var name = item.textContent.replace(/PDF$|视频$/, '').trim();

    contentWrapper.innerHTML = '';

    if (type === 'pdf') {
      infoBar.innerHTML = name + ' <span class="type-tag tag-pdf">课件</span>';
      var iframe = document.createElement('iframe');
      iframe.className = 'pdf-iframe';
      iframe.src = src;
      contentWrapper.appendChild(iframe);
    } else if (type === 'video') {
      infoBar.innerHTML = name + ' <span class="type-tag tag-video">视频</span>';
      var video = document.createElement('video');
      video.className = 'video-embed';
      video.src = src;
      video.controls = true;
      video.style.width = '100%';
      video.style.height = '100%';
      contentWrapper.appendChild(video);
    }
  };
});

document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); }
});
</script>
</body>
</html>
